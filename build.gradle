buildscript {
    repositories {
        maven { url = 'https://maven.minecraftforge.net' }
        maven { url "https://plugins.gradle.org/m2/" }
        mavenCentral()
        maven {
            name = 'sponge'
            url = 'https://repo.spongepowered.org/maven'
        }
    }
    dependencies {
        classpath 'org.spongepowered:mixingradle:0.7.+'
        classpath "org.tomlj:tomlj:1.1.1"
    }
}


plugins {
    id "com.modrinth.minotaur" version "2.+"
    id 'net.minecraftforge.gradle' version '[6.0,6.2)'
    id 'org.parchmentmc.librarian.forgegradle' version '1.+'
}

apply plugin: 'idea'
apply plugin: 'java-library'
apply plugin: 'maven-publish'
apply plugin: 'org.spongepowered.mixin'
apply from: 'gradle/template-config.gradle'

def templateRepositories = project.ext.templateRepositories
def templateFeatureDependencies = project.ext.templateFeatureDependencies
def templateDependencies = project.ext.templateDependencies
def templateDevPackDependencies = project.ext.templateDevPackDependencies
def template = project.ext.template
def hasModrinthTarget = !template.modrinthProject.isBlank()
def hasCurseforgeTarget = template.curseforgeProject > 0L
def curseforgeUploadTaskName = "uploadCurseForge"

jarJar.enable()

//Make the result of jarJar the default.
tasks.jarJar.configure {
    it.archiveClassifier.set("")
    finalizedBy("reobfJarJar")
}

tasks.jar.configure {
    it.archiveClassifier.set("slim")
}

tasks.matching { it.name == "reobfJar" }.configureEach {
    enabled = false
}

version = config.mod_version
group = config.maven_group
base {
    archivesName = "${config.archive_name}-${config.mc_version}"
}

java.toolchain.languageVersion = JavaLanguageVersion.of(17)

mixin {
    add sourceSets.main, "${config.mod_id}.refmap.json"
}

println('Java: ' + System.getProperty('java.version') + ' JVM: ' + System.getProperty('java.vm.version') + '(' + System.getProperty('java.vendor') + ') Arch: ' + System.getProperty('os.arch'))
minecraft {
    mappings channel: 'parchment', version: '2023.09.03-1.20.1'
    accessTransformer = file('src/main/resources/META-INF/accesstransformer.cfg')
    copyIdeResources = true
    runs {
        client {
            workingDirectory project.file('run/client')
            property 'forge.logging.console.level', 'debug'
            property 'forge.enabledGameTestNamespaces', config.mod_id
            property 'mixin.env.remapRefMap', 'true'
            property 'mixin.env.refMapRemappingFile', "${projectDir}/build/createSrgToMcp/output.srg"
            def args = new ArrayList()

            args.add "--mixin"
            args.add "mixins.${config.mod_id}.json"

            args.add "-Dmixin.env.disableRefMap=true"

            if (hasConfig("mc_user") && !config.mc_user.isEmpty()) {
                def userId = config.mc_user.split(',', 2)
                args.add "--username"
                args.add userId[0]

                args.add "--uuid"
                if (userId.length > 1) args.add userId[1]
                else args.add "00000000000000000000000000000001" // this is a default
            }

            setArgs(args)
            mods {
                "${mod_id}" {
                    source sourceSets.main
                }
            }
        }

        server {
            workingDirectory project.file('run/server')
            property 'forge.logging.console.level', 'debug'
            property 'forge.enabledGameTestNamespaces', config.mod_id
            property 'mixin.env.remapRefMap', 'true'
            property 'mixin.env.refMapRemappingFile', "${projectDir}/build/createSrgToMcp/output.srg"
            def args = new ArrayList()
            args.add "--mixin"
            args.add "mixins.${config.mod_id}.json"
            setArgs(args)
            mods {
                "${mod_id}" {
                    source sourceSets.main
                }
            }
        }

        gameTestServer {
            workingDirectory project.file('run/server')
            property 'forge.logging.console.level', 'debug'
            property 'forge.enabledGameTestNamespaces', config.mod_id
            property 'mixin.env.remapRefMap', 'true'
            property 'mixin.env.refMapRemappingFile', "${projectDir}/build/createSrgToMcp/output.srg"
            def args = new ArrayList()
            args.add "--mixin"
            args.add "mixins.${config.mod_id}.json"
            setArgs(args)
            mods {
                "${mod_id}" {
                    source sourceSets.main
                }
            }
        }

        data {
            workingDirectory project.file('run/data')
            property 'forge.logging.console.level', 'debug'
            property 'forge.enabledGameTestNamespaces', config.mod_id
            property 'mixin.env.remapRefMap', 'true'
            property 'mixin.env.refMapRemappingFile', "${projectDir}/build/createSrgToMcp/output.srg"

            def args = new ArrayList()
            args.add "--mod"
            args.add config.mod_id
            args.add "--all"
            args.add "--output"
            args.add file('src/generated/resources/').absolutePath
            args.add "--existing"
            args.add file('src/main/resources/').absolutePath

            args.add "--mixin"
            args.add "mixins.${config.mod_id}.json"

            setArgs(args)

            mods {
                "${config.mod_id}" {
                    source sourceSets.main
                }
            }
        }
    }
}

sourceSets.main.resources { srcDir 'src/generated/resources' }

repositories {
    def addConfiguredRepository = { Map<String, ?> repoSpec ->
        maven {
            name = repoSpec.name
            url = repoSpec.url
            if (!repoSpec.groups.isEmpty() || !repoSpec.groupRegexes.isEmpty()) {
                content {
                    repoSpec.groups.each { includeGroup(it) }
                    repoSpec.groupRegexes.each { includeGroupByRegex(it) }
                }
            }
        }
    }

    mavenLocal()
    (templateRepositories.builtin + templateRepositories.custom + templateRepositories.devPacks)
            .unique { repoSpec -> repoSpec.url.toString() }
            .each(addConfiguredRepository)
    flatDir { dirs "libraries/${config.mc_version}/all" }
    flatDir { dirs "libraries/${config.mc_version}/classpathOnly" }
    flatDir { dirs "libraries/${config.mc_version}/runtimeOnly" }
    flatDir { dirs "libraries/embedded" }
}

def createConfiguredDependency = { String notation, boolean transitive ->
    project.dependencies.create(notation) {
        it.transitive = transitive
    }
}

dependencies {
    minecraft "net.minecraftforge:forge:${config.mc_version}-${config.forge_version}"
    testAnnotationProcessor sourceSets.main.output
    testImplementation platform("org.junit:junit-bom:5.10.2")
    testImplementation "org.junit.jupiter:junit-jupiter"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"

    (templateFeatureDependencies + templateDependencies + templateDevPackDependencies).each { dependencySpec ->
        if (dependencySpec.configuration == "jarJar") {
            jarJar(project.dependencies.create("${dependencySpec.group}:${dependencySpec.artifact}:${dependencySpec.range}") {
                it.transitive = dependencySpec.transitive
            })
            return
        }

        def baseDependency = createConfiguredDependency(dependencySpec.notation, dependencySpec.transitive)
        def resolvedDependency = dependencySpec.deobf ? fg.deobf(baseDependency) : baseDependency
        add(dependencySpec.configuration, resolvedDependency)
    }
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

def resourceTargets = ['META-INF/mods.toml', 'pack.mcmeta']
def replaceProperties = [
        minecraft_version: config.mc_version, minecraft_version_range: config.mc_range,
        loader_version_range: config.forge_range,
        forge_version    : "${config.mc_version}-${config.forge_version}", forge_version_range: config.forge_range,
        mod_id           : config.mod_id, mod_name: config.mod_name, mod_license: config.mod_license, mod_version: config.mod_version,
        mod_authors      : config.mod_authors, mod_description: config.mod_description,
        modrinth_project : config.modrinth_project,
        issue_tracker_url: config.issue_tracker_url, mod_credits: config.mod_credits
]
processResources {
    inputs.properties replaceProperties
    replaceProperties.put 'project', project

    filesMatching(resourceTargets) {
        expand replaceProperties
    }
}

jar {
    manifest {
        attributes([
                "Specification-Title"     : config.mod_id,
                "Specification-Vendor"    : "Zeitheron",
                "Specification-Version"   : "1",
                "Implementation-Title"    : project.name,
                "Implementation-Version"  : archiveVersion,
                "Implementation-Vendor"   : config.mod_authors,
                "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ"),
                "MixinConfigs"            : "mixins.${config.mod_id}.json"
        ])
    }
    archiveClassifier.set('slim')
}

publishing {
    publications {
        mavenJava(MavenPublication) {
//            artifact jar
            from components.java
            artifact(tasks.jarJar)
            artifactId = config.mod_id

            pom {
                packaging = 'pom'
                withXml {
                    def root = asNode()
                    root.dependencies.replaceNode {}
                }
            }
        }
    }
    repositories {
        maven {
            url = System.env.MAVEN_URL != null ? System.env.MAVEN_URL : config.maven_url
            
            def mavenUser = System.env.MAVEN_USER != null ? System.env.MAVEN_USER : config.maven_user
