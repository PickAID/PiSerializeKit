    from sourceSets.main.allJava
    archiveClassifier = 'sources'
}

artifacts {
    archives deobfJar
    archives srcJar
}

def changelogHeadingVersion = { String headingText ->
    headingText.trim().replaceFirst(/^\[([^\]]+)](?:\s*-\s*.*)?$/, '$1').replaceFirst(/^v(?=\d)/, "").trim()
}

def extractVersionChangelog = { String text, String version, String sourceLabel ->
    def lines = text.replace("\r\n", "\n").replace("\r", "\n").split("\n", -1).toList()
    def headingPattern = /^(#{1,6})\s+(.+?)\s*$/
    def start = -1
    def level = 0
    def wanted = version.replaceFirst(/^v(?=\d)/, "")
    lines.eachWithIndex { String line, int index ->
        if (start >= 0) return
        def matcher = line =~ headingPattern
        if (matcher.matches() && changelogHeadingVersion(matcher[0][2]) == wanted) {
            start = index + 1
            level = matcher[0][1].length()
        }
    }
    if (start < 0) {
        throw new GradleException("Could not find changelog section for version ${version} in ${sourceLabel}")
    }
    def end = lines.size()
    for (int index = start; index < lines.size(); index++) {
        def matcher = lines[index] =~ headingPattern
        if (matcher.matches() && matcher[0][1].length() <= level) {
            end = index
            break
        }
    }
    def extracted = lines.subList(start, end).join("\n").trim()
    if (extracted.isBlank()) {
        throw new GradleException("Changelog section for version ${version} in ${sourceLabel} is empty")
    }
    extracted
}

def configuredText = { String inlineText, String relativeFile, String sectionMode, String fallbackText = "" ->
    if (inlineText != null && !inlineText.isBlank()) return inlineText
    if (relativeFile != null && !relativeFile.isBlank()) {
        def source = file(relativeFile)
        if (!source.isFile()) {
            throw new GradleException("Configured publish text file does not exist: ${relativeFile}")
        }
        def text = source.getText("UTF-8")
        return sectionMode == "full" ? text : extractVersionChangelog(text, template.finalVersion, relativeFile)
    }
    fallbackText
}

def modrinthChangelogText = configuredText(template.publishModrinth.changelog, template.publishModrinth.changelogFile, template.publishModrinth.changelogSection, "No changelog was specified.")
def curseforgeChangelogText = configuredText(template.publishCurseforge.changelog, template.publishCurseforge.changelogFile, template.publishCurseforge.changelogSection, "")
def modrinthBodyText = template.publishModrinth.syncBodyFile == null || template.publishModrinth.syncBodyFile.isBlank() ? "" : configuredText("", template.publishModrinth.syncBodyFile, "full", "")
def runtimeUploadJar = tasks.jarJar.archiveFile

modrinth {
    token = System.env.MODRINTH_TOKEN ?: template.modrinthToken ?: "NONE"
    projectId = template.modrinthProject
    versionNumber = template.finalVersion
    versionName = template.publishModrinth.versionName
    changelog = modrinthChangelogText
    versionType = template.releaseType
    uploadFile = runtimeUploadJar.get().asFile
    gameVersions = template.publishModrinth.gameVersions
    loaders = template.publishModrinth.loaders
    detectLoaders = false
    debugMode = template.publishModrinth.debug
    if (!modrinthBodyText.isBlank()) syncBodyFrom = modrinthBodyText
    dependencies {
        def mods = config.required_mods.split(";")
        if (mods.length > 0 && (mods.length > 1 || !mods[0].isEmpty()))
            for (final def one in mods) {
                if (one.isBlank()) continue
                if (one.startsWith("@")) {
                    def pars = one.substring(1).split(":", 2)
                    if (pars[0].equalsIgnoreCase("m")) required.project pars[1].trim()
                } else required.project one.trim()
            }
        mods = config.optional_mods.split(";")
        if (mods.length > 0 && (mods.length > 1 || !mods[0].isEmpty()))
            for (final def one in mods) {
                if (one.isBlank()) continue
                if (one.startsWith("@")) {
                    def pars = one.substring(1).split(":", 2)
                    if (pars[0].equalsIgnoreCase("m")) optional.project pars[1].trim()
                } else optional.project one.trim()
            }
        mods = config.incompatible_mods.split(";")
        if (mods.length > 0 && (mods.length > 1 || !mods[0].isEmpty()))
            for (final def one in mods) {
                if (one.isBlank()) continue
                if (one.startsWith("@")) {
                    def pars = one.substring(1).split(":", 2)
                    if (pars[0].equalsIgnoreCase("m")) incompatible.project pars[1].trim()
                } else incompatible.project one.trim()
            }
        mods = config.embedded_mods.split(";")
        if (mods.length > 0 && (mods.length > 1 || !mods[0].isEmpty()))
            for (final def one in mods) {
                if (one.isBlank()) continue
                if (one.startsWith("@")) {
                    def pars = one.substring(1).split(":", 2)
                    if (pars[0].equalsIgnoreCase("m")) embedded.project pars[1].trim()
                } else embedded.project one.trim()
            }
    }
}

def curseforgeRelationSlugs = { String relationKey ->
    def raw = config[relationKey]
    if (raw == null || raw.toString().isBlank()) return []
    raw.toString().split(";").collect { it.trim() }.findAll { !it.isBlank() }.collect { entry ->
        if (!entry.startsWith("@")) return entry
        def parts = entry.substring(1).split(":", 2)
        parts.length == 2 && parts[0].equalsIgnoreCase("c") ? parts[1].trim() : ""
    }.findAll { !it.isBlank() }
}

def writeMultipartText = { OutputStream output, String boundary, String name, String value ->
    output.write("--${boundary}\r\n".getBytes("UTF-8"))
    output.write("Content-Disposition: form-data; name=\"${name}\"\r\n\r\n".getBytes("UTF-8"))
    output.write(value.getBytes("UTF-8"))
    output.write("\r\n".getBytes("UTF-8"))
}

def writeMultipartFile = { OutputStream output, String boundary, String name, File file ->
    output.write("--${boundary}\r\n".getBytes("UTF-8"))
    output.write("Content-Disposition: form-data; name=\"${name}\"; filename=\"${file.name}\"\r\n".getBytes("UTF-8"))
    output.write("Content-Type: application/java-archive\r\n\r\n".getBytes("UTF-8"))
    file.withInputStream { input -> input.transferTo(output) }
    output.write("\r\n".getBytes("UTF-8"))
}

tasks.register(curseforgeUploadTaskName) {
    group = "upload"
    description = "Uploads the built runtime jar to CurseForge using project.toml settings."
    dependsOn("validateUploadConfiguration")
    dependsOn("reobfJarJar")
    onlyIf { hasCurseforgeTarget }
    doLast {
        def token = System.env.CURSEFORGE_TOKEN ?: template.curseforgeToken ?: ""
        def relations = []
        [required_mods: "requiredDependency", optional_mods: "optionalDependency", incompatible_mods: "incompatible", embedded_mods: "embeddedLibrary"].each { relationKey, relationType ->
            curseforgeRelationSlugs(relationKey).each { slug -> relations << [slug: slug, type: relationType] }
        }
        def metadata = [changelog: curseforgeChangelogText, changelogType: template.publishCurseforge.changelogType, displayName: template.publishCurseforge.displayName, gameVersions: template.publishCurseforge.gameVersions, releaseType: template.releaseType]
        if (template.publishCurseforge.manualRelease) metadata.isManualRelease = true
        if (template.publishCurseforge.parentFileId > 0L) metadata.parentFileID = template.publishCurseforge.parentFileId
        if (!relations.isEmpty()) metadata.relations = [projects: relations]
        def boundary = "----PickAID${System.currentTimeMillis()}"
        def uploadUrl = new URL("https://minecraft.curseforge.com/api/projects/${template.curseforgeProject}/upload-file")
        def connection = (HttpURLConnection) uploadUrl.openConnection()
        connection.setRequestMethod("POST")
        connection.setDoOutput(true)
        connection.setRequestProperty("X-Api-Token", token)
        connection.setRequestProperty("Content-Type", "multipart/form-data; boundary=${boundary}")
        connection.outputStream.withCloseable { output ->
            writeMultipartText(output, boundary, "metadata", groovy.json.JsonOutput.toJson(metadata))
            writeMultipartFile(output, boundary, "file", runtimeUploadJar.get().asFile)
            output.write("--${boundary}--\r\n".getBytes("UTF-8"))
        }
        def responseCode = connection.responseCode
        def responseText = responseCode >= 400 ? connection.errorStream?.getText("UTF-8") : connection.inputStream?.getText("UTF-8")
        if (responseCode < 200 || responseCode >= 300) {
            throw new GradleException("CurseForge upload failed with HTTP ${responseCode}: ${responseText ?: ''}")
        }
        logger.lifecycle("CurseForge upload accepted: ${responseText ?: "HTTP ${responseCode}"}")
    }
}

import net.minecraftforge.gradle.common.tasks.SignJar

task signJar(type: SignJar, dependsOn: jar) {
    onlyIf {
        System.env.MC_KS_PASS != null
    }
    keyStore = System.env.MC_KS_PATH
    alias = System.env.MC_KS_ALIAS
    storePass = System.env.MC_KS_PASS
    keyPass = System.env.MC_KS_PASS
    inputFile = jar.archiveFile
    outputFile = jar.archiveFile
}

def reobfFile = jar.archiveFile.get().asFile
def reobfArtifact = artifacts.add('default', reobfFile) {
    type 'jar'
    builtBy 'signJar'
}

jar.finalizedBy('reobfJar')
publish.dependsOn('reobfJar')

build.dependsOn signJar

def validateUploadConfiguration = tasks.register('validateUploadConfiguration') {
    group = "upload"

    doLast {
        modrinthChangelogText
        curseforgeChangelogText

        if (!hasModrinthTarget && !hasCurseforgeTarget) {
            throw new GradleException("At least one upload platform must be configured")
        }

        if (!(template.releaseType in ["alpha", "beta", "release"])) {
            throw new GradleException("release_type must be one of alpha, beta, release")
        }

        def modrinthToken = System.env.MODRINTH_TOKEN ?: template.modrinthToken ?: ""
        if (hasModrinthTarget && !modrinthToken.trim()) {
            throw new GradleException("MODRINTH_TOKEN or publish.modrinth.token or publish.modrinth_token is required when Modrinth publishing is configured")
        }

        def curseforgeToken = System.env.CURSEFORGE_TOKEN ?: template.curseforgeToken ?: ""
        if (hasCurseforgeTarget && !curseforgeToken.trim()) {
            throw new GradleException("CURSEFORGE_TOKEN or publish.curseforge.token or publish.curseforge_token is required when CurseForge publishing is configured")
        }
    }
}

if (hasModrinthTarget) {
    tasks.named("modrinth").configure {
        dependsOn(validateUploadConfiguration)
        dependsOn("reobfJarJar")
    }
}

tasks.register('buildAndUploadMod') {
    group = "upload"
    dependsOn validateUploadConfiguration
    dependsOn "reobfJarJar"

    if (hasModrinthTarget) {
        dependsOn 'modrinth'
    }
    if (hasCurseforgeTarget) {
        dependsOn curseforgeUploadTaskName
    }

    doLast {
        println "Upload complete."
    }
}

afterEvaluate {
    if (!template.mavenUrl.isBlank() && hasModrinthTarget) {
        tasks["modrinth"].dependsOn.add(publish)
    }
    if (!template.mavenUrl.isBlank() && hasCurseforgeTarget) {
        tasks.named(curseforgeUploadTaskName).configure { dependsOn(publish) }
    }
}

tasks.withType(JavaCompile).configureEach {
