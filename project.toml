[dependencies.deobf_compile_only]
# Local script-facing compile helpers.
script_entry_bridge = "dev.latvian.mods:kubejs-forge:2001.6.4-build.120"
embedded_js_engine = "dev.latvian.mods:rhino-forge:2001.2.2-build.18"

[dependencies.deobf_implementation]
# Runtime dependency needed by PiSerializeKit's current Forge integration layer.
platform_runtime_bridge = { notation = "dev.architectury:architectury-forge:9.1.12", transitive = false }

[publish]
# Leave tokens out of git. Prefer environment variables for real releases.
maven_url = "https://maven.mihono.cn/repository/pickaid1201/"
curseforge_project = 0
modrinth_project = ""
release_type = "alpha"

[naming]
# Published jar naming.
archive_name = "piserializekit"
jar_format = "{archive_name}-{mc_version}-{version}"
