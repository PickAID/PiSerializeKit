def renderJarFormat = { String format, Map<String, String> tokens ->
    def matcher = (format =~ /\{([^}]+)\}/)
    matcher.each { match ->
        def token = match[1]
        if (!allowedJarTokens.contains(token)) {
            failConfig("Unsupported jar_format token: ${token}")
        }
    }

    def rendered = format
    tokens.each { token, value ->
        rendered = rendered.replace("{${token}}", value)
    }

    if (rendered.isBlank()) {
        failConfig("Rendered jar_format must not be blank")
    }
    if (rendered =~ /[\/\\\\:]/) {
        failConfig("Rendered jar_format contains illegal path characters: ${rendered}")
    }

    rendered
}

def renderedArchiveStem = renderJarFormat(
    namingTable.getString("jar_format") ?: "{archive_name}-{mc_version}-{version}",
    [
        archive_name: archiveName,
        mod_id      : modId,
        version     : finalVersion,
        mc_version  : mcVersion,
        loader      : "forge"
    ]
)

def resolveVersion = { String overrideKey, String defaultsKey ->
    def overrideValue = overridesTable?.getString(overrideKey)
    overrideValue != null ? overrideValue : expectStringFromTable(versionsTable, defaultsKey, "versions")
}

