def featureSupportSpecs = []
if (featureSupportTable != null) {
    featureSupportTable.keySet().each { featureKey ->
        if (!allowedFeatures.contains(featureKey)) {
            failConfig("Unknown feature_support key: ${featureKey}")
        }

        def featureTable = featureSupportTable.getTable(featureKey)
        if (featureTable == null) {
            failConfig("feature_support.${featureKey} must be a table")
        }

        featureTable.keySet().each { key ->
            if (key != "dependencies") {
                failConfig("Unsupported key in feature_support.${featureKey}: ${key}")
            }
        }

        if (project.ext.enabledFeatures[featureKey]) {
            featureSupportSpecs.addAll(
                parseDependencyTables(featureTable.getTable("dependencies"), "feature_support.${featureKey}.dependencies").collect { spec ->
                    spec + [feature: featureKey]
                }
            )
        }
    }
}

def dependencyTokens = [
    mc_version     : mcVersion,
    forge_version  : forgeVersion,
    registrate     : project.ext.resolvedFeatureVersions.registrate,
    jei            : project.ext.resolvedFeatureVersions.jei,
    curios         : project.ext.resolvedFeatureVersions.curios,
    geckolib       : project.ext.resolvedFeatureVersions.geckolib,
    player_animator: project.ext.resolvedFeatureVersions.playerAnimator,
    bendylib       : project.ext.resolvedFeatureVersions.bendylib,
    mixin_extras   : project.ext.resolvedFeatureVersions.mixinExtras
]

def renderTemplateTokens = { String input, String path ->
    if (input == null || input.isBlank()) {
        return input
    }

    def matcher = (input =~ /\{([^}]+)\}/)
    matcher.each { match ->
        def token = match[1]
        if (!dependencyTokens.containsKey(token)) {
            failConfig("Unsupported token ${token} in ${path}")
        }
    }

    def rendered = input
    dependencyTokens.each { token, value ->
        rendered = rendered.replace("{${token}}", value)
    }
    rendered
}

def renderDependencySpecs = { List<Map<String, Object>> specs, String prefix ->
    specs.collect { spec ->
        def specLabel = prefix == null || prefix.isBlank() ? spec.name : "${prefix}.${spec.name}"
        def renderedNotation = renderTemplateTokens(spec.notation as String, "${specLabel}.notation")
        def renderedRange = renderTemplateTokens(spec.range as String, "${specLabel}.range")
        def notationParts = parseNotation(renderedNotation, specLabel)
        spec + [
            notation: renderedNotation,
            range   : renderedRange,
            group   : notationParts.group,
            artifact: notationParts.artifact,
            version : notationParts.version
        ]
    }
}

ext.templateBuiltinDependencies = renderDependencySpecs(builtinDependencySpecs, "builtin_dependencies")
