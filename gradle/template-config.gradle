    geckolib_version    : resolvedFeatureVersions.geckolib,
    playeranimator_version: resolvedFeatureVersions.playerAnimator,
    bendylib_version    : resolvedFeatureVersions.bendylib,
    mixin_extras_version: resolvedFeatureVersions.mixinExtras,
    rpg_projects        : "",
    reference_projects  : "",
    mod_id              : modId,
