// project.toml is intentionally small at the top level so authors can see the
// supported surface at a glance and configuration errors stay fail-fast.
def allowedTopLevel = ["schema_version", "template_version", "mod", "features", "dev_packs", "repositories", "dependencies", "overrides", "publish", "naming"] as Set
def allowedFeatures = ["jei", "curios", "geckolib", "player_animator", "mixin_extras"] as Set
def allowedOverrideToFeature = [
    "jei_version"             : "jei",
    "curios_version"          : "curios",
    "geckolib_version"        : "geckolib",
    "player_animator_version" : "player_animator",
    "bendylib_version"        : "player_animator",
    "mixin_extras_version"    : "mixin_extras"
] as Map<String, String>
def allowedJarTokens = ["archive_name", "mod_id", "version", "mc_version", "loader"] as Set
def allowedDependencyBuckets = [
    api                    : [configuration: "api", deobf: false, supportsRange: false],
    implementation         : [configuration: "implementation", deobf: false, supportsRange: false],
    additional_runtime_classpath: [configuration: "additionalRuntimeClasspath", deobf: false, supportsRange: false],
    compile_only_api       : [configuration: "compileOnlyApi", deobf: false, supportsRange: false],
    compile_only           : [configuration: "compileOnly", deobf: false, supportsRange: false],
    runtime_only           : [configuration: "runtimeOnly", deobf: false, supportsRange: false],
    annotation_processor   : [configuration: "annotationProcessor", deobf: false, supportsRange: false],
    test_implementation    : [configuration: "testImplementation", deobf: false, supportsRange: false],
    test_runtime_only      : [configuration: "testRuntimeOnly", deobf: false, supportsRange: false],
    deobf_api              : [configuration: "api", deobf: true, supportsRange: false],
    deobf_implementation   : [configuration: "implementation", deobf: true, supportsRange: false],
    deobf_compile_only_api : [configuration: "compileOnlyApi", deobf: true, supportsRange: false],
    deobf_compile_only     : [configuration: "compileOnly", deobf: true, supportsRange: false],
    deobf_runtime_only     : [configuration: "runtimeOnly", deobf: true, supportsRange: false],
    deobf_test_implementation: [configuration: "testImplementation", deobf: true, supportsRange: false],
    deobf_test_runtime_only: [configuration: "testRuntimeOnly", deobf: true, supportsRange: false],
    jarjar                 : [configuration: "jarJar", deobf: false, supportsRange: true]
] as Map<String, Map<String, Object>>

def localFirstString = { String key, String defaultValue = "" ->
    def localValue = localPublishTable?.getString(key)
    if (localValue != null) {
        return localValue
    }
    optionalStringFromTable(publishTable, key, defaultValue)
}

def optionalStringArrayFromTable = { def table, String key ->
    def array = table == null ? null : table.getArray(key)
    if (array == null) {
        return []
    }

    (0..<array.size()).collect { int index ->
        def value = array.getString(index)
        if (value == null || value.isBlank()) {
            failConfig("Expected non-empty string array entries in ${key}")
        }
        value
    }
}

templateParsed.dottedKeySet().collect { it.split("\\.")[0] }.unique().each { key ->
    if (!allowedTopLevel.contains(key)) {
        failConfig("Unknown top-level key: ${key}")
    }
}

featuresTable.keySet().each { key ->
    if (!allowedFeatures.contains(key)) {
        failConfig("Unknown feature key: ${key}")
    }
}

if (overridesTable != null) {
    overridesTable.keySet().each { key ->
        def owningFeature = allowedOverrideToFeature[key]
        if (owningFeature == null) {
            failConfig("Unknown override key: ${key}")
        }
        if (!(featuresTable.getBoolean(owningFeature) ?: false)) {
            failConfig("Override ${key} requires enabled feature ${owningFeature}")
        }
    }
}

def qualifyPath = { String prefix, String key ->
    prefix == null || prefix.isBlank() ? key : "${prefix}.${key}"
}

def parseRepositoryTable = { def table, String prefix = "" ->
    def repositories = [:]
    if (table == null) {
        return repositories
    }

    table.keySet().each { key ->
        def label = prefix == null || prefix.isBlank() ? key : qualifyPath(prefix, key)
        def repoName = key
        def repoUrl
        def groups = []
        def groupRegexes = []

        if (table.isString(key)) {
            repoUrl = table.getString(key)
        } else {
            def repositoryTable = null
            try {
                repositoryTable = table.getTable(key)
            } catch (RuntimeException ignored) {
                repositoryTable = null
            }
            if (repositoryTable == null) {
                failConfig("Repository ${label} must be a string URL or inline table")
            }

            def allowedRepoKeys = ["url", "name", "groups", "group_regexes"] as Set
            repositoryTable.keySet().each { repoKey ->
                if (!allowedRepoKeys.contains(repoKey)) {
                    failConfig("Repository ${label} has unsupported key ${repoKey}")
                }
            }

            repoUrl = repositoryTable.getString("url")
            repoName = optionalStringFromTable(repositoryTable, "name", key)
            groups = optionalStringArrayFromTable(repositoryTable, "${label}.groups")
            groupRegexes = optionalStringArrayFromTable(repositoryTable, "${label}.group_regexes")
        }

        if (repoUrl == null || repoUrl.isBlank()) {
            failConfig("Repository ${label} must be a non-empty string URL")
        }
        repositories[key] = [
            id          : key,
            name        : repoName,
            url         : repoUrl,
            groups      : groups,
            groupRegexes: groupRegexes
        ]
    }

    repositories
}

def builtinRepositories = parseRepositoryTable(builtinRepositoriesTable, "builtin_repositories")
def customRepositories = parseRepositoryTable(repositoriesTable)

def parseNotation = { String notation, String path ->
    def parts = notation.split(":", 3)
    if (parts.length != 3 || parts.any { it.isBlank() }) {
        failConfig("Dependency ${path} must use group:artifact:version notation")
    }
    [
        group   : parts[0],
        artifact: parts[1],
        version : parts[2]
    ]
}

def parseDependencyTables = { def rootTable, String prefix = "" ->
    def dependencySpecs = []
    if (rootTable == null) {
        return dependencySpecs
    }

    rootTable.keySet().each { bucketKey ->
        def bucketSpec = allowedDependencyBuckets[bucketKey]
        if (bucketSpec == null) {
            if (prefix == null || prefix.isBlank()) {
                failConfig("Unknown dependency bucket: ${bucketKey}")
            }
            failConfig("Unknown dependency bucket in ${prefix}: ${bucketKey}")
        }

        def bucketTable = rootTable.getTable(bucketKey)
        if (bucketTable == null) {
            failConfig("Dependency bucket ${qualifyPath(prefix, bucketKey)} must be a TOML table")
        }

        bucketTable.keySet().each { dependencyKey ->
            def entryPath = prefix == null || prefix.isBlank()
                ? "${bucketKey}.${dependencyKey}"
                : "${prefix}.${bucketKey}.${dependencyKey}"
            def supportsRange = bucketSpec.supportsRange as boolean
            def notation
            def transitive = true
            def range = ""
            def inlineTable = null

            if (bucketTable.isString(dependencyKey)) {
                notation = bucketTable.getString(dependencyKey)
            } else if (bucketTable.isTable(dependencyKey)) {
                inlineTable = bucketTable.getTable(dependencyKey)

                if (inlineTable.contains("notation") && !inlineTable.isString("notation")) {
                    failConfig("Dependency ${entryPath}.notation must be a string")
                }
                if (inlineTable.contains("range") && !inlineTable.isString("range")) {
                    failConfig("Dependency ${entryPath}.range must be a string")
                }
                if (inlineTable.contains("transitive") && !inlineTable.isBoolean("transitive")) {
                    failConfig("Dependency ${entryPath}.transitive must be a boolean")
                }

                notation = inlineTable.getString("notation")
                transitive = optionalBooleanFromTable(inlineTable, "transitive", true)
                range = optionalStringFromTable(inlineTable, "range")
            } else {
                failConfig("Dependency ${entryPath} must be a string or inline table")
            }

            if (notation == null || notation.isBlank()) {
                failConfig("Dependency ${entryPath} must define notation")
            }

            if (inlineTable != null) {
                def allowedEntryKeys = (supportsRange ? ["notation", "range", "transitive"] : ["notation", "transitive"]) as Set
                inlineTable.keySet().each { key ->
                    if (!allowedEntryKeys.contains(key)) {
                        failConfig("Dependency ${entryPath} has unsupported key ${key}")
                    }
                }
            } else if (supportsRange) {
                failConfig("Dependency ${entryPath} must be an inline table with notation and range")
            }

            if (supportsRange && range.isBlank()) {
                failConfig("Dependency ${entryPath} must define range")
            }
            if (!supportsRange && !range.isBlank()) {
                failConfig("Dependency ${entryPath} does not support range")
            }

            def notationParts = parseNotation(notation, entryPath)
            dependencySpecs << [
                name        : dependencyKey,
                bucket      : bucketKey,
                configuration: bucketSpec.configuration,
                deobf       : bucketSpec.deobf,
                notation    : notation,
                transitive  : transitive,
                range       : range,
                group       : notationParts.group,
                artifact    : notationParts.artifact,
                version     : notationParts.version
            ]
        }
    }

    dependencySpecs
}

// Generic dependency tables let projects opt into extra libraries without the
// template growing one more hard-coded feature switch for every ecosystem mod.
def templateDependencySpecs = parseDependencyTables(dependenciesTable)
def builtinDependencySpecs = parseDependencyTables(builtinDependenciesTable, "builtin_dependencies")

def enabledDevPacks = []
if (devPacksTable != null) {
    devPacksTable.keySet().each { packKey ->
        if (!devPacksTable.isBoolean(packKey)) {
            failConfig("dev_packs.${packKey} must be a boolean")
        }
        if (defaultsDevPacksTable == null || defaultsDevPacksTable.getTable(packKey) == null) {
            failConfig("Unknown dev pack: ${packKey}")
        }
        if (devPacksTable.getBoolean(packKey)) {
            enabledDevPacks << packKey
        }
    }
}

def devPackRepositories = [:]
def devPackDependencySpecs = []
enabledDevPacks.each { packKey ->
    def packRootPath = "dev_packs.${packKey}"
    def packTable = defaultsDevPacksTable.getTable(packKey)
    if (packTable == null) {
        failConfig("Missing default configuration for ${packRootPath}")
    }

    packTable.keySet().each { key ->
        if (!(key in ["description", "repositories", "dependencies"])) {
            failConfig("Unsupported key in ${packRootPath}: ${key}")
        }
    }

    parseRepositoryTable(packTable.getTable("repositories"), "${packRootPath}.repositories").each { repoName, repoSpec ->
        def existingSpec = devPackRepositories[repoName]
        if (existingSpec != null && existingSpec != repoSpec) {
            failConfig("Dev pack repository ${repoName} points to multiple URLs")
        }
        devPackRepositories[repoName] = repoSpec
    }

    devPackDependencySpecs.addAll(
        parseDependencyTables(packTable.getTable("dependencies"), "${packRootPath}.dependencies").collect { spec ->
            spec + [pack: packKey]
        }
    )
}

