import groovy.util.ConfigObject

def failConfig = { String message ->
    throw new GradleException("[template-config] ${message}")
}

def projectFile = file("${rootDir}/project.toml")
def projectLocalFile = file("${rootDir}/project.local.toml")
def legacyTemplateFile = file("${rootDir}/template.toml")
def legacyBuildTxt = file("${rootDir}/build.txt")
def defaultsFile = file("${rootDir}/gradle/template-defaults.toml")

if (legacyTemplateFile.exists()) {
    failConfig("template.toml is no longer supported; migrate to project.toml")
}
if (!projectFile.isFile()) {
    failConfig("project.toml is required")
}
if (legacyBuildTxt.exists()) {
    failConfig("build.txt is no longer supported; migrate to project.toml")
}
if (!defaultsFile.isFile()) {
    failConfig("gradle/template-defaults.toml is required")
}

def parseToml = { File source ->
    def classpathUrls = project.buildscript.configurations.classpath.files.collect { it.toURI().toURL() } as URL[]
    def tomljLoader = new URLClassLoader(classpathUrls, this.class.classLoader)
    def tomlClass = Class.forName("org.tomlj.Toml", true, tomljLoader)
    def parsed = tomlClass.parse(source.toPath())
    if (parsed.hasErrors()) {
        def rendered = parsed.errors().collect { it.toString() }.join(System.lineSeparator())
        failConfig("Failed to parse ${source.name}:${System.lineSeparator()}${rendered}")
    }
    parsed
}

def expectLong = { def parsed, String key ->
    def value = parsed.getLong(key)
    if (value == null) {
        failConfig("Missing required integer key: ${key}")
    }
    value
}

def expectTable = { def parsed, String key ->
    def table = parsed.getTable(key)
    if (table == null) {
        failConfig("Missing required table: ${key}")
    }
    table
}

def expectStringFromTable = { def table, String key, String path ->
    def value = table.getString(key)
    if (value == null) {
        failConfig("Missing required string key: ${path}.${key}")
    }
    value
}

def expectStringFromParsed = { def parsed, String key ->
    def value = parsed.getString(key)
    if (value == null) {
        failConfig("Missing required string key: ${key}")
    }
    value
}

def optionalStringFromTable = { def table, String key, String defaultValue = "" ->
    def value = table == null ? null : table.getString(key)
    value != null ? value : defaultValue
}

def optionalLongFromTable = { def table, String key, long defaultValue = 0L ->
    def value = table == null ? null : table.getLong(key)
    value != null ? value : defaultValue
}

def optionalBooleanFromTable = { def table, String key, boolean defaultValue = false ->
    def value = table == null ? null : table.getBoolean(key)
    value != null ? value : defaultValue
}

def expectStringArray = { def table, String key, String path ->
    def array = table.getArray(key)
    if (array == null) {
        failConfig("Missing required array key: ${path}.${key}")
    }

    def values = (0..<array.size()).collect { int index ->
        def value = array.getString(index)
        if (value == null) {
            failConfig("Expected string array entries in ${path}.${key}")
        }
        value
    }

    if (values.isEmpty()) {
        failConfig("${path}.${key} must not be empty")
    }

    values
}

